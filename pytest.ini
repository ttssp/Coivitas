# ============================================================
# Purpose: let the test gate run reproducibly from the repo root in a clean shell:
#   `python3 -m pytest tests/python/conformance/test_basic.py -v`
# without requiring the tester to manually editable-install the repo SDK.
#
# Design trade-offs
# -----------------
# 1. The repo-root pytest.ini takes priority over packages/sdk-python/pyproject.toml's
#    [tool.pytest.ini_options] (pytest config discovery: root ini > pyproject).
#    sys.path injection is done by the repo-root conftest.py (loaded from the same directory, no -p needed).
# 2. testpaths is locked to tests/python; collection is not opened into sub-packages (avoids split-brain).
# 3. asyncio_mode = auto matches the sub pyproject; there are no async tests yet, this is just a placeholder.
# 4. The repo-root pytest.ini + conftest.py are infrastructure, not L0-L4 package code.
# 5. python_functions adds should_*, so the sdk-python sub-package's BDD `should_*` unit tests
#    can be collected; testpaths stays locked to tests/python to keep split-brain; sdk-python CI runs with an explicit path:
#      python3 -m pytest packages/sdk-python/tests
[pytest]
minversion = 8.0
testpaths = tests/python
python_files = test_*.py
python_classes = Test*
python_functions = test_* should_*
asyncio_mode = auto
addopts =
    -v
    --strict-markers
    --tb=short
