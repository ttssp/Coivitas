; setup.cfg — backward compatibility (older setuptools + pip)
; The main metadata is declared in pyproject.toml (PEP 621); this file only carries compatibility declarations + tool sub-config.
; Do not duplicate pyproject's metadata fields here, to avoid dual-source drift.

[metadata]
name = coivitas

[options]
python_requires = >=3.11
package_dir =
    = src
packages = find:

[options.packages.find]
where = src

[options.package_data]
coivitas = py.typed
